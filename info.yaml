# Tiny Tapeout project information
project:
  title:        "TinyDMA-2C"
  author:       "Andrew Kim"
  discord:      "kima2503"
  description:  "Two-channel DMA engine that moves bytes in external PSRAM over SPI"
  language:     "SystemVerilog"
  clock_hz:     0
  tiles: "1x1"
  top_module:  "tt_um_akim_tinydma"
  source_files:
    - "project.v"
    - "dma_pkg.sv"
    - "spi_master.sv"
    - "spi_psram_ctrl.sv"
    - "cfg_reg.sv"
    - "dma_scheduler.sv"
    - "dma_controller.sv"
    - "tinydma_top.sv"

pinout:
  ui[0]: "cfg_data[0]"
  ui[1]: "cfg_data[1]"
  ui[2]: "cfg_data[2]"
  ui[3]: "cfg_data[3]"
  ui[4]: "cfg_data[4]"
  ui[5]: "cfg_data[5]"
  ui[6]: "cfg_data[6]"
  ui[7]: "cfg_data[7]"

  uo[0]: "busy"
  uo[1]: "done_pulse"
  uo[2]: "ch0_done"
  uo[3]: "ch1_done"
  uo[4]: "ch0_active"
  uo[5]: "ch1_active"
  uo[6]: "cfg_pending"
  uo[7]: "cfg_error"

  uio[0]: "cfg_valid"
  uio[1]: "start"
  uio[2]: "spi_miso / spi_mosi"
  uio[3]: "spi_cs_n / unused"
  uio[4]: "spi_clk / unused"
  uio[5]: "unused"
  uio[6]: "unused"
  uio[7]: "unused"

yaml_version: 6
